<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>SISTEMA DE GESTIÓN ACADÉMICA - MAX</title><style>:root{--neon-blue:#00f3ff;--neon-red:#ff0055;--dark-bg:#06080c;--panel-bg:#0f131c;}*{box-sizing:border-box;}body{background-color:var(--dark-bg);color:#ffffff;font-family:'Courier New',Courier,monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:40px;user-select:none;overflow:hidden;}body::before{content:" ";display:block;position:fixed;top:0;left:0;bottom:0;right:0;background:linear-gradient(rgba(18,16,16,0) 50%,rgba(0,0,0,0.3) 50%),linear-gradient(90deg,rgba(255,0,0,0.03),rgba(0,255,0,0.01),rgba(0,0,255,0.03));z-index:10;background-size:100% 6px,4px 100%;pointer-events:none;}.header{text-align:center;width:100%;max-width:1200px;margin-bottom:30px;}h1{color:var(--neon-blue);margin:0;font-size:36px;letter-spacing:4px;text-shadow:0 0 15px var(--neon-blue);text-transform:uppercase;}.level-text{font-size:24px;margin-top:10px;letter-spacing:2px;text-transform:uppercase;}.timer-container{width:100%;max-width:600px;height:18px;background:#111;border:2px solid var(--neon-blue);margin:20px auto 0 auto;box-shadow:0 0 10px rgba(0,243,255,0.2);}.timer-bar{width:100%;height:100%;background-color:var(--neon-blue);transition:width 0.1s linear;box-shadow:0 0 15px var(--neon-blue);}.game-container{display:flex;flex-direction:row;justify-content:center;align-items:stretch;gap:40px;background:var(--panel-bg);padding:40px;border-radius:12px;border:2px solid #2a354d;box-shadow:0 0 40px rgba(0,243,255,0.15);width:100%;max-width:1300px;height:65vh;}.target-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;width:350px;border-right:1px solid #1f2736;padding-right:40px;}.target-title{font-size:18px;margin-bottom:20px;color:#8a9bb8;letter-spacing:2px;text-transform:uppercase;}.target-fingerprint{width:100%;height:100%;max-height:450px;border:3px solid var(--neon-blue);box-shadow:inset 0 0 30px rgba(0,243,255,0.25);display:flex;align-items:center;justify-content:center;position:relative;background:radial-gradient(circle,#1a233a 0%,#080b12 100%);}.grid-panel{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);gap:20px;flex-grow:1;}.fragment{border:3px solid #3a4b6e;background:#141924;cursor:pointer;position:relative;transition:all 0.2s ease;display:flex;align-items:center;justify-content:center;border-radius:6px;}.fragment:hover{border-color:#6682b6;background:#1b2230;transform:scale(1.02);}.fragment.selected{border-color:var(--neon-blue);box-shadow:0 0 20px var(--neon-blue);background:#183247;}.pattern{width:85%;height:85%;position:relative;opacity:0.9;}.pattern::before,.pattern::after{content:'';position:absolute;border:4px solid var(--neon-blue);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);}.p1::before{width:35%;height:75%;border-radius:45%;}.p1::after{width:70%;height:95%;border-radius:45%;border-left:none;}.p2::before{width:80%;height:35%;border-radius:25%;}.p2::after{width:50%;height:80%;border-radius:50%;border-bottom:none;}.p3::before{width:65%;height:65%;border-radius:0;transform:translate(-50%,-50%) rotate(45deg);}.p3::after{width:35%;height:35%;border-style:dashed;}.p4::before{width:85%;height:50%;border-radius:50% 50% 0 0;}.p4::after{width:40%;height:85%;border-right:none;}.p-false1::before{width:75%;height:75%;border-color:#4a5d7e;border-style:dotted;}.p-false2::before{width:20%;height:90%;border-radius:0;background-color:var(--neon-blue);}.p-false3::after{width:85%;height:85%;border-color:#4a5d7e;transform:translate(-50%,-50%) scaleX(0.4);}.p-false4::before{width:55%;height:55%;border-radius:12px;border-top:none;}.status-text{font-size:22px;margin-top:30px;text-align:center;height:30px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;}.success-msg{color:#00ff66;text-shadow:0 0 12px #00ff66;}.fail-msg{color:var(--neon-red);text-shadow:0 0 12px var(--neon-red);}</style></head><body><div class="header"><h1>SISTEMA DE CONFIGURACIÓN DE RED</h1><div class="timer-container"><div class="timer-bar" id="timer"></div></div><div class="level-text">FAS_MOD: <span id="level-display" style="color:var(--neon-blue);">1/3</span></div></div><div class="game-container"><div class="target-panel"><div class="target-title">MATRIZ BASE</div><div class="target-fingerprint" id="target-display"></div></div><div class="grid-panel" id="matrix-grid"></div></div><div class="status-text" id="status-message">CARGANDO RECURSOS...</div><script>let currentLevel=1;const maxLevels=3;let timeLeft=100;let timerInterval;let selectedFragments=[];const fragmentData=[{id:1,class:"p1",isCorrect:true},{id:2,class:"p2",isCorrect:true},{id:3,class:"p3",isCorrect:true},{id:4,class:"p4",isCorrect:true},{id:5,class:"p-false1",isCorrect:false},{id:6,class:"p-false2",isCorrect:false},{id:7,class:"p-false3",isCorrect:false},{id:8,class:"p-false4",isCorrect:false}];function initGame(){selectedFragments=[];timeLeft=100;document.getElementById("level-display").textContent=`${currentLevel}/${maxLevels}`;document.getElementById("status-message").className="status-text";document.getElementById("status-message").textContent="SELECCIONA LOS 4 COMPONENTES COINCIDENTES";const targetDisplay=document.getElementById("target-display");targetDisplay.style.borderColor="var(--neon-blue)";targetDisplay.innerHTML=`<div class="pattern p1" style="position:absolute; transform: scale(1.6);"></div><div class="pattern p2" style="position:absolute; transform: scale(1.3) rotate(30deg); opacity:0.5;"></div><div class="pattern p4" style="position:absolute; transform: scale(1.0); opacity:0.6;"></div>`;const shuffledFragments=[...fragmentData].sort(()=>Math.random()-0.5);const grid=document.getElementById("matrix-grid");grid.innerHTML="";shuffledFragments.forEach(frag=>{const fragCard=document.createElement("div");fragCard.classList.add("fragment");fragCard.dataset.id=frag.id;const patternDiv=document.createElement("div");patternDiv.classList.add("pattern",frag.class);fragCard.appendChild(patternDiv);fragCard.addEventListener("click",()=>selectFragment(fragCard));grid.appendChild(fragCard);});clearInterval(timerInterval);startTimer();}function startTimer(){const timerBar=document.getElementById("timer");timerBar.style.backgroundColor="var(--neon-blue)";timerInterval=setInterval(()=>{timeLeft-=1.0;if(timeLeft<=0){timeLeft=0;clearInterval(timerInterval);gameOver(false);}timerBar.style.width=timeLeft+"%";},100);}function selectFragment(element){const fragId=parseInt(element.dataset.id);if(element.classList.contains("selected")){element.classList.remove("selected");selectedFragments=selectedFragments.filter(id=>id!==fragId);}else{if(selectedFragments.length>=4)return;element.classList.add("selected");selectedFragments.push(fragId);if(selectedFragments.length===4){checkCombination();}}}function checkCombination(){clearInterval(timerInterval);const hasError=selectedFragments.some(id=>id>4);if(!hasError){if(currentLevel<maxLevels){document.getElementById("status-message").textContent="MÓDULO VALIDADOR EN REGLA. SIGUIENTE...";document.getElementById("status-message").classList.add("success-msg");currentLevel++;setTimeout(initGame,1200);}else{gameOver(true);}}else{gameOver(false);}}function gameOver(isWin){clearInterval(timerInterval);const msgElement=document.getElementById("status-message");if(isWin){msgElement.textContent="¡VERIFICACIÓN COMPLETA: SINCRO ACABADA!";msgElement.className="status-text success-msg";document.getElementById("target-display").style.borderColor="#00ff66";}else{msgElement.textContent="ERROR EN SECUENCIA: RESETEANDO REGISTRO";msgElement.className="status-text fail-msg";document.getElementById("timer").style.backgroundColor="var(--neon-red)";currentLevel=1;setTimeout(initGame,2500);}}window.onload=initGame;</script></body></html>
