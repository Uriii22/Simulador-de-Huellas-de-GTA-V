<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA Casino Heist - Fingerprint Hack</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-red: #ff0055;
            --dark-bg: #0a0c10;
            --panel-bg: #121620;
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        /* Efecto de líneas de escaneo estilo monitor antiguo */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--neon-blue);
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        .timer-container {
            width: 300px;
            height: 10px;
            background: #222;
            border: 1px solid var(--neon-blue);
            margin: 15px auto;
            position: relative;
        }

        .timer-bar {
            width: 100%;
            height: 100%;
            background-color: var(--neon-blue);
            transition: width 0.1s linear;
            box-shadow: 0 0 8px var(--neon-blue);
        }

        .game-container {
            display: flex;
            gap: 40px;
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #2a354d;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
        }

        /* Lado Izquierdo: El objetivo */
        .target-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 200px;
        }

        .target-fingerprint {
            width: 160px;
            height: 220px;
            border: 2px solid var(--neon-blue);
            box-shadow: inset 0 0 15px rgba(0, 243, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: radial-gradient(circle, #1a233a 0%, #0c101b 100%);
        }

        /* Lado Derecho: Los fragmentos a elegir */
        .grid-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 15px;
        }

        .fragment {
            width: 100px;
            height: 100px;
            border: 2px solid #3a4b6e;
            background: #161b26;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fragment:hover {
            border-color: #5b75a6;
            background: #1c2333;
        }

        .fragment.selected {
            border-color: var(--neon-blue);
            box-shadow: 0 0 12px var(--neon-blue);
            background: #172c3d;
        }

        /* Generador Visual de Huellas/Patrones mediante CSS (Reemplaza las imágenes) */
        .pattern {
            width: 70px;
            height: 70px;
            position: relative;
            opacity: 0.85;
        }

        /* Estilos base para simular líneas dactilares/circuitos digitales */
        .pattern::before, .pattern::after {
            content: '';
            position: absolute;
            border: 3px solid var(--neon-blue);
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Tipos de patrones aleatorios (Simulación de fragmentos dactilares) */
        .p1::before { width: 20px; height: 50px; border-radius: 40%; }
        .p1::after  { width: 40px; height: 70px; border-radius: 40%; border-left: none; }

        .p2::before { width: 50px; height: 20px; border-radius: 20%; }
        .p2::after  { width: 30px; height: 50px; border-radius: 50%; border-bottom: none; }

        .p3::before { width: 40px; height: 40px; border-radius: 0; transform: translate(-50%, -50%) rotate(45deg); }
        .p3::after  { width: 20px; height: 20px; border-style: dashed; }

        .p4::before { width: 60px; height: 30px; border-radius: 50% 50% 0 0; }
        .p4::after  { width: 20px; height: 60px; border-right: none; }

        /* Fragmentos incorrectos (Falsos distractores) */
        .p-false1::before { width: 50px; height: 50px; border-color: #4a5d7e; border-style: dotted; }
        .p-false2::before { width: 10px; height: 60px; border-radius: 0; background-color: var(--neon-blue); }
        .p-false3::after  { width: 55px; height: 55px; border-color: #4a5d7e; transform: translate(-50%, -50%) scaleX(0.5); }
        .p-false4::before { width: 35px; height: 35px; border-radius: 10px; border-top: none; }

        /* Pantallas de Estado */
        .status-text {
            font-size: 18px;
            margin-top: 15px;
            height: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .success-msg { color: #00ff66; text-shadow: 0 0 8px #00ff66; }
        .fail-msg { color: var(--neon-red); text-shadow: 0 0 8px var(--neon-red); }
    </style>
</head>
<body>

    <div class="header">
        <h1>SISTEMA DE HACKEO DE HUELLAS</h1>
        <div class="timer-container">
            <div class="timer-bar" id="timer"></div>
        </div>
        <div>NIVEL: <span id="level-display" style="color: var(--neon-blue);">1/3</span></div>
    </div>

    <div class="game-container">
        <!-- Panel de visualización de la huella objetivo -->
        <div class="target-panel">
            <div style="font-size: 12px; margin-bottom: 8px; color: #8a9bb8;">HUELLA OBJETIVO</div>
            <div class="target-fingerprint" id="target-display">
                <!-- Aquí se inyectará visualmente la huella objetivo completa combinando los patrones correctos -->
            </div>
        </div>

        <!-- Matriz de selección de fragmentos -->
        <div class="grid-panel" id="matrix-grid">
            <!-- Los 8 fragmentos se generarán mediante JavaScript aquí -->
        </div>
    </div>

    <div class="status-text" id="status-message">SELECCIONA LOS 4 FRAGMENTOS CORRECTOS</div>

    <script>
        // Configuración básica del juego
        let currentLevel = 1;
        const maxLevels = 3;
        let timeLeft = 100;
        let timerInterval;
        let selectedFragments = [];
        
        // Base de datos de fragmentos lógicos
        // Cada nivel requiere que el usuario encuentre los 4 fragmentos con id del 1 al 4. Los del 5 al 8 son distractores.
        const fragmentData = [
            { id: 1, class: "p1", isCorrect: true },
            { id: 2, class: "p2", isCorrect: true },
            { id: 3, class: "p3", isCorrect: true },
            { id: 4, class: "p4", isCorrect: true },
            { id: 5, class: "p-false1", isCorrect: false },
            { id: 6, class: "p-false2", isCorrect: false },
            { id: 7, class: "p-false3", isCorrect: false },
            { id: 8, class: "p-false4", isCorrect: false }
        ];

        function initGame() {
            selectedFragments = [];
            timeLeft = 100;
            document.getElementById("level-display").textContent = `${currentLevel}/${maxLevels}`;
            document.getElementById("status-message").className = "status-text";
            document.getElementById("status-message").textContent = "ACCESO REQUERIDO: ELIGE 4 COMPONENTES";
            
            // 1. Dibujar la huella objetivo combinando los elementos correctos en un solo cuadro gráfico
            const targetDisplay = document.getElementById("target-display");
            targetDisplay.innerHTML = `
                <div class="pattern p1" style="position:absolute; transform: scale(1.4);"></div>
                <div class="pattern p2" style="position:absolute; transform: scale(1.1) rotate(30deg); opacity:0.5;"></div>
                <div class="pattern p4" style="position:absolute; transform: scale(0.8); opacity:0.6;"></div>
            `;

            // 2. Mezclar todos los fragmentos (Correctos + Falsos) de forma aleatoria
            const shuffledFragments = [...fragmentData].sort(() => Math.random() - 0.5);

            // 3. Renderizar la cuadrícula del panel derecho
            const grid = document.getElementById("matrix-grid");
            grid.innerHTML = "";
            
            shuffledFragments.forEach(frag => {
                const fragCard = document.createElement("div");
                fragCard.classList.add("fragment");
                fragCard.dataset.id = frag.id;
                fragCard.dataset.correct = frag.isCorrect;
                
                // Elemento visual interno generado por CSS
                const patternDiv = document.createElement("div");
                patternDiv.classList.add("pattern", frag.class);
                
                fragCard.appendChild(patternDiv);
                fragCard.addEventListener("click", () => selectFragment(fragCard));
                grid.appendChild(fragCard);
            });
